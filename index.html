<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoberOS Pro v2.0 | Timate Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
            --blur: blur(25px);
            --accent: #4facfe;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
        }

        #desktop {
            width: 100vw; height: 100vh;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85869y.jpg') no-repeat center center/cover;
            position: relative;
        }

        /* Окна */
        .window {
            position: absolute;
            min-width: 300px; min-height: 200px;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            z-index: 10;
            overflow: hidden;
            transition: opacity 0.2s;
        }

        .win-header {
            height: 38px; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; cursor: move; user-select: none;
        }

        .win-title { color: #fff; font-size: 13px; font-weight: 500; opacity: 0.9; }

        .win-content { flex: 1; position: relative; color: white; overflow: hidden; background: rgba(0,0,0,0.1); }
        
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* Уголок изменения размера */
        .resizer {
            width: 16px; height: 16px;
            background: transparent;
            position: absolute; right: 0; bottom: 0;
            cursor: nwse-resize;
            z-index: 1000;
        }

        /* Док */
        .dock {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            height: 60px; background: var(--glass);
            backdrop-filter: var(--blur); border: 1px solid var(--border);
            border-radius: 20px; display: flex; align-items: center; padding: 0 12px; gap: 10px;
            z-index: 10000;
        }

        .dock-item {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; font-size: 22px;
        }

        .dock-item:hover { transform: scale(1.2) translateY(-10px); background: rgba(255,255,255,0.2); }

        .btn-close { 
            width: 12px; height: 12px; background: #ff5f56; border-radius: 50%; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-close:hover { filter: brightness(1.2); }

    </style>
</head>
<body>

<div id="desktop">
    <div class="dock">
        <div class="dock-item" title="Terminal" onclick="spawnWindow('Terminal', 'terminal')">💻</div>
        <div class="dock-item" title="Timate" onclick="openTimate()">💬</div>
        <div class="dock-item" title="Reload" onclick="location.reload()">🔄</div>
    </div>
</div>

<script>
    let zIndex = 100;

    function spawnWindow(title, type, url = "") {
        const id = 'win-' + Math.random().toString(36).substr(2, 5);
        const win = document.createElement('div');
        win.className = 'window';
        win.id = id;
        
        // Начальные размеры
        if (title.includes('TIMATE')) {
            win.style.width = '420px';
            win.style.height = '650px';
        } else {
            win.style.width = '550px';
            win.style.height = '350px';
        }
        
        win.style.top = (50 + (zIndex % 20) * 5) + 'px';
        win.style.left = (100 + (zIndex % 20) * 5) + 'px';
        win.style.zIndex = ++zIndex;

        let content = "";
        if (type === 'iframe') {
            content = `<iframe src="${url}" allow="microphone; camera; clipboard-write"></iframe>`;
        } else if (type === 'terminal') {
            content = `<div style="padding:15px; font-family:monospace; color:#0f0;">> SoberOS Terminal Ready...<br>> Type 'help' for info.</div>`;
        } else {
            content = `<div style="padding:20px;">${url}</div>`;
        }

        win.innerHTML = `
            <div class="win-header" onmousedown="focusWin('${id}')">
                <span class="win-title">${title}</span>
                <div class="btn-close" onclick="document.getElementById('${id}').remove()"></div>
            </div>
            <div class="win-content">${content}</div>
            <div class="resizer" onmousedown="initResize(event, '${id}')"></div>
        `;

        document.getElementById('desktop').appendChild(win);
        makeDraggable(win);
    }

    function openTimate() {
        spawnWindow('TIMATE Messenger', 'iframe', 'https://timate.ru'); 
    }

    function focusWin(id) {
        document.getElementById(id).style.zIndex = ++zIndex;
    }

    // --- ПЕРЕТАСКИВАНИЕ ---
    function makeDraggable(el) {
        const header = el.querySelector('.win-header');
        header.onmousedown = function(e) {
            if (e.target.classList.contains('btn-close')) return;
            
            focusWin(el.id);
            let shiftX = e.clientX - el.offsetLeft;
            let shiftY = e.clientY - el.offsetTop;

            function moveAt(pageX, pageY) {
                el.style.left = pageX - shiftX + 'px';
                el.style.top = pageY - shiftY + 'px';
            }

            function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
            document.addEventListener('mousemove', onMouseMove);
            
            document.onmouseup = function() {
                document.removeEventListener('mousemove', onMouseMove);
                document.onmouseup = null;
            };
        };
    }

    // --- ИЗМЕНЕНИЕ РАЗМЕРА ---
    function initResize(e, id) {
        e.preventDefault();
        e.stopPropagation();
        const el = document.getElementById(id);
        const startWidth = el.offsetWidth;
        const startHeight = el.offsetHeight;
        const startX = e.clientX;
        const startY = e.clientY;

        function doResize(ev) {
            const newWidth = startWidth + (ev.clientX - startX);
            const newHeight = startHeight + (ev.clientY - startY);
            
            if (newWidth > 200) el.style.width = newWidth + 'px';
            if (newHeight > 150) el.style.height = newHeight + 'px';
        }

        function stopResize() {
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
        }

        document.addEventListener('mousemove', doResize);
        document.addEventListener('mouseup', stopResize);
    }
</script>
</body>
</html>
